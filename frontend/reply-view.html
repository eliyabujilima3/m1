<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reply to Message | Meshack Makala</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div id="header-placeholder"></div>
  <main class="section container">
    <div class="section-title"><h2>Reply to Message</h2></div>
    <div id="message-detail" class="message-card"></div>
    <form id="reply-form" class="card form-group" style="margin-top:1.75rem; max-width:720px;">
      <div class="form-group">
        <label for="reply">Message Reply</label>
        <textarea id="reply" name="reply" placeholder="Write a professional response" required></textarea>
      </div>
      <button class="button-primary" type="submit">Save Reply</button>
      <p id="reply-status"></p>
    </form>
  </main>
  <div id="footer-placeholder"></div>
  <script src="script.js"></script>
  <script src="reply-view.js"></script>
</body>
</html>
