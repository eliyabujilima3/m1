<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Meshack Makala</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <div id="header-placeholder"></div>

  <main class="section container">
    <div class="section-title">
      <h2>Admin Login</h2>
    </div>

    <div class="card" style="max-width: 520px; margin-top: 2rem;">

      <form id="admin-login-form">

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter admin email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>

        <button class="button-primary" type="submit">Login</button>

        <p id="admin-status"></p>

      </form>

    </div>
  </main>

  <div id="footer-placeholder"></div>

  <script src="script.js"></script>

  <script>
    document.getElementById("admin-login-form").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const status = document.getElementById("admin-status");

      const ADMIN_EMAIL = "meshakimakala54@gmail.com";
      const ADMIN_PASSWORD = "Mishaely@2002";

      if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
        status.style.color = "green";
        status.innerText = "Login successful! Redirecting...";

        setTimeout(() => {
          window.location.href = "admin.html";
        }, 1200);

      } else {
        status.style.color = "red";
        status.innerText = "Invalid login credentials.";
      }
    });
  </script>

</body>
</html>
